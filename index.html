<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arctic Falcon — Data & AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@300;400;500;600&family=DM+Sans:ital,opsz,wght@0,9..40,400;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F0F2F5;
      --primary: #0B2545;
      --muted: #6E849A;
      --accent: #E8531A;
      --grid: rgba(11, 37, 69, 0.06);
    }

    html, body { height: 100%; }

    body {
      font-family: 'Barlow', sans-serif;
      background-color: var(--bg);
      color: var(--primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 72px 72px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(240,242,245,0.75) 100%);
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }

    .logo {
      width: 180px;
      height: auto;
      margin-bottom: 2.8rem;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.1s;
    }

    .wordmark {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: clamp(3.2rem, 9vw, 6.5rem);
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--primary);
      line-height: 1;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.25s;
    }

    .tagline-row {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      margin-top: 1.1rem;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.4s;
    }

    .tagline-row::before,
    .tagline-row::after {
      content: '';
      display: block;
      width: 44px;
      height: 1.5px;
      background-color: var(--accent);
    }

    .tagline-label {
      font-family: 'Barlow', sans-serif;
      font-weight: 600;
      font-size: 0.68rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .subline {
      margin-top: 1.5rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      font-style: italic;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.55s;
    }

    .sub-tagline {
      margin-top: 0.5rem;
      font-family: 'Barlow', sans-serif;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.65s;
    }

    footer {
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Barlow', sans-serif;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.8s;
      z-index: 1;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo, .wordmark, .tagline-row, .subline, .sub-tagline, footer {
        animation: none; opacity: 1;
      }
    }
  </style>
</head>
